<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Rock, Paper, Scissors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .game-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
      font-size: 3rem;
    }

    .rules {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }

    .rules h3 {
      color: #333;
      margin-bottom: 15px;
      text-align: center;
    }

    .rules ul {
      list-style: none;
      color: #555;
    }

    .rules li {
      padding: 5px 0;
      padding-left: 20px;
      position: relative;
    }

    .rules li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #667eea;
      font-weight: bold;
    }

    #start-game-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      margin-top: 20px;
    }

    #start-game-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    #start-game-btn:active {
      transform: translateY(-1px);
    }

    .result-display {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
      display: none;
    }

    .result-display.show {
      display: block;
    }

    .result-display.win {
      background: #d4edda;
      color: #155724;
    }

    .result-display.lose {
      background: #f8d7da;
      color: #721c24;
    }

    .result-display.draw {
      background: #fff3cd;
      color: #856404;
    }
  </style>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>🎮 Rock, Paper, Scissors</h1>
    <p class="subtitle">Test your luck against the computer!</p>
    
    <div class="game-icons">
      <span>✊</span>
      <span>✋</span>
      <span>✌️</span>
    </div>

    <div class="rules">
      <h3>How to Play</h3>
      <ul>
        <li>Click "Start Game" to begin</li>
        <li>Type ROCK, PAPER, or SCISSORS when prompted</li>
        <li>Rock beats Scissors</li>
        <li>Paper beats Rock</li>
        <li>Scissors beats Paper</li>
      </ul>
    </div>

    <button id="start-game-btn">Start Game!</button>
    
    <div id="result-display" class="result-display"></div>
  </div>
</body>
</html>
